<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StyleStock | Reportes</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-icon">👕</span>
      <span class="brand-name">StyleStock</span>
    </div>
    <div class="topbar-right">
      <button class="btn-secondary" onclick="window.location.href='menu.html'">← Menú</button>
      <button class="btn-logout" onclick="window.location.href='index.html'">Cerrar Sesión</button>
    </div>
  </header>

  <main class="page-main">
    <div class="page-header">
      <h1>Reportes</h1>
      <button onclick="imprimirReporte()">🖨 Imprimir</button>
    </div>

    <div class="reportes-grid" id="reportes-kpi"></div>

    <div class="reporte-seccion">
      <h2 class="seccion-titulo">Productos con stock crítico</h2>
      <div class="tabla-wrapper">
        <table class="tabla">
          <thead>
            <tr>
              <th>Producto</th>
              <th>Categoría</th>
              <th>Talla</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="tabla-criticos"></tbody>
        </table>
      </div>
    </div>

    <div class="reporte-seccion">
      <h2 class="seccion-titulo">Todos los productos</h2>
      <div class="tabla-wrapper">
        <table class="tabla">
          <thead>
            <tr>
              <th>Producto</th>
              <th>Categoría</th>
              <th>Talla</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Valor en stock</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="tabla-todos"></tbody>
        </table>
      </div>
    </div>

  </main>

  <div id="toast" class="toast"></div>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', cargarReportes);
  </script>
</body>
</html>
