<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StyleStock | Editar Producto</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-icon">👕</span>
      <span class="brand-name">StyleStock</span>
    </div>
    <div class="topbar-right">
      <button class="btn-secondary" onclick="window.location.href='productos.html'">← Volver</button>
      <button class="btn-logout" onclick="window.location.href='index.html'">Cerrar Sesión</button>
    </div>
  </header>

  <main class="page-main">
    <div class="page-header">
      <h1>Editar Producto</h1>
    </div>

    <div class="form-card">
      <div class="input-group">
        <label for="nombre">Nombre del producto *</label>
        <input type="text" id="nombre" maxlength="60">
      </div>
      <div class="form-row">
        <div class="input-group">
          <label for="categoria">Categoría *</label>
          <select id="categoria">
            <option value="Camisas">Camisas</option>
            <option value="Pantalones">Pantalones</option>
            <option value="Chaquetas">Chaquetas</option>
          </select>
        </div>
        <div class="input-group">
          <label for="talla">Talla</label>
          <select id="talla">
            <option value="XS">XS</option>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
            <option value="XXL">XXL</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="input-group">
          <label for="precio">Precio ($) *</label>
          <input type="number" id="precio" min="0">
        </div>
        <div class="input-group">
          <label for="stock">Stock *</label>
          <input type="number" id="stock" min="0">
        </div>
      </div>
      <div class="input-group">
        <label for="descripcion">Descripción (opcional)</label>
        <input type="text" id="descripcion" maxlength="100">
      </div>
      <div class="form-actions">
        <p id="edit-msg" class="form-msg"></p>
        <div class="form-btns">
          <button class="btn-danger" id="btn-eliminar">🗑 Eliminar</button>
          <button class="btn-secondary" onclick="window.location.href='productos.html'">Cancelar</button>
          <button id="btn-guardar">Guardar Cambios</button>
        </div>
      </div>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      cargarDatosEdicion();
      document.getElementById('btn-guardar').addEventListener('click', guardarCambios);
      document.getElementById('btn-eliminar').addEventListener('click', eliminarProducto);
    });
  </script>
</body>
</html>
